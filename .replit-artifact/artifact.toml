kind = "web"
previewPath = "/"
title = "Skillionaires"
version = "1.0.0"
id = "artifacts/skillionaires"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25339

[services.development]
run = "pnpm --filter @workspace/skillionaires run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skillionaires", "run", "build" ]
publicDir = "artifacts/skillionaires/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25339"
BASE_PATH = "/"
